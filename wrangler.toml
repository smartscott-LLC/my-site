# Cloudflare configuration for the Astro Cloudflare adapter (Workers + static
# assets).
#
# Build for Cloudflare with `DEPLOY_TARGET=cloudflare pnpm build`; the
# @astrojs/cloudflare adapter then generates the full deploy config (the worker
# entry plus the static-asset binding) under dist/. These root-level settings
# are merged into that generated config at build time. Deploy with
# `npx wrangler deploy`, or connect the repo in the Cloudflare dashboard.

name = "astro-rocket"
compatibility_date = "2026-01-31"

# Astro's Workers runtime shim (and some dependencies) use Node built-ins, so
# the on-demand routes — the contact form and newsletter — need nodejs_compat.
compatibility_flags = ["nodejs_compat"]
